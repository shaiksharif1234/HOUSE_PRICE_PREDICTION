<!DOCTYPE html>
<html>
<head>
    <title>Multi Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f4f6fb, #eef1f7);
        }

        .container {
            max-width: 1100px;
            margin: 60px auto;
        }

        .card {
            background: #fff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>📈 Area vs Average Price</h2>
        <canvas id="multiChart"></canvas>
    </div>
</div>

<script>
new Chart(document.getElementById("multiChart"), {
    type: "line",
    data: {
        labels: {{ areas | tojson }},
        datasets: [{
            label: "Avg Price (₹)",
            data: {{ prices | tojson }},
            borderColor: "#6a5cff",
            backgroundColor: "rgba(106,92,255,0.2)",
            fill: true,
            tension: 0.45,
            borderWidth: 3,
            pointRadius: 5
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                ticks: {
                    callback: v => "₹ " + v.toLocaleString()
                }
            }
        }
    }
});
</script>

</body>
</html>
