<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | House Price AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
}

/* container */
.container{
max-width:900px;
margin:80px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* title */
h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:35px;
}

/* contact cards */
.contact-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#f4f6fb;
padding:20px;
border-radius:14px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.2);
}

.icon{
font-size:32px;
margin-bottom:10px;
}

.card p{
margin:5px 0;
}

/* form */
form{
margin-top:35px;
display:grid;
gap:15px;
}

input, textarea{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

textarea{
resize:none;
height:120px;
}

button{
padding:14px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* back button */
.back{
text-align:center;
margin-top:30px;
}

.back a{
text-decoration:none;
background:#667eea;
color:white;
padding:10px 22px;
border-radius:25px;
}

/* responsive */
@media(max-width:768px){
.container{
margin:40px 15px;
}
}

</style>
</head>

<body>

<div class="container">

<h1>📞 Contact Us</h1>
<p class="subtitle">Have questions about House Price AI? Get in touch.</p>

<div class="contact-grid">

<div class="card">
<div class="icon">📧</div>
<h3>Email</h3>
<p>shaiksharif1256@gmail.com</p>
</div>

<div class="card">
<div class="icon">📱</div>
<h3>Phone</h3>
<p>+91 9392446266</p>
</div>

<div class="card">
<div class="icon">📍</div>
<h3>Location</h3>
<p>India</p>
</div>

</div>

<form action="/contact" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="back">
<a href="/">⬅ Back to Home</a>
</div>

</div>

</body>
</html>
