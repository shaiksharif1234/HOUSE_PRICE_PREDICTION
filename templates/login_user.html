<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Login | House Price Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 22px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
            text-align: center;
        }

        h2 {
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        input:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 6px rgba(99,102,241,0.35);
        }

        .login-btn {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .links {
            margin-top: 18px;
            font-size: 14px;
        }

        .links a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .back-home {
            margin-top: 22px;
            display: inline-block;
            padding: 10px 22px;
            border-radius: 30px;
            background: #ff5f6d;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .back-home:hover {
            background: #e04855;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>👤 User Login</h2>
    <p class="subtitle">Access your property predictions</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login_user">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="links">
        Don’t have an account?
        <a href="/signup">Create account</a>
    </div>

    <a href="/" class="back-home">🏠 Back to Home</a>
</div>

</body>

</html>
