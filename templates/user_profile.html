<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile | HousePrice AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #f4f6fb, #eef1f7);
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .profile-header h2 {
            margin: 0;
            font-size: 26px;
        }

        .profile-header p {
            color: #666;
            margin-top: 5px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: linear-gradient(135deg, #6a5cff, #7c6dff);
            color: #fff;
            padding: 25px;
            border-radius: 14px;
            text-align: center;
        }

        .stat-box h3 {
            margin: 0;
            font-size: 22px;
        }

        .stat-box p {
            margin-top: 8px;
            font-size: 14px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 26px;
            background: linear-gradient(135deg, #6a5cff, #7c6dff);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">

        <div class="profile-header">
            <h2>👤 {{ name }}</h2>
            <p>{{ email }}</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>{{ total }}</h3>
                <p>Total Predictions</p>
            </div>

            <div class="stat-box">
                <h3>₹ {{ avg_price }}</h3>
                <p>Average Price</p>
            </div>
        </div>

        <div style="text-align:center;">
            <a href="/user_dashboard" class="btn">⬅ Back to Dashboard</a>
        </div>

    </div>
</div>

</body>
</html>
