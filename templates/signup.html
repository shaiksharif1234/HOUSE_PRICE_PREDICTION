<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .signup-container {
            background: #ffffff;
            width: 95%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 35px 90px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 22px;
        }

        input {
            padding: 13px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37,99,235,0.3);
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transition: 0.3s;
        }

        .signup-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(0,0,0,0.3);
        }

        .divider {
            margin: 28px 0;
            height: 1px;
            background: #e5e7eb;
        }

        .links a {
            display: block;
            margin: 10px 0;
            font-size: 14px;
            font-weight: 600;
            color: #2563eb;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 18px;
            padding: 10px 22px;
            border-radius: 30px;
            background: #ef4444;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .back-home:hover {
            background: #dc2626;
        }
    </style>
</head>

<body>

<div class="signup-container">

    <h2>📝 Create Account</h2>
    <p class="subtitle">Join to predict smarter with AI</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup">
        <div class="input-group">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="signup-btn">
            Create Account
        </button>
    </form>

    <div class="divider"></div>

    <div class="links">
        <a href="/login_user">🔐 Already have an account? Login</a>
    </div>

    <a href="/" class="back-home">🏠 Back to Home</a>

</div>

</body>
</html>
