<!DOCTYPE html>
<html>
<head>
<title>Market Insights</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3c72,#2a5298);
margin:0;
padding:40px;
color:white;
text-align:center;
}

.container{
background:white;
color:black;
padding:40px;
border-radius:20px;
max-width:900px;
margin:auto;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

table{
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px 18px;
border:1px solid #ddd;
}

th{
background:#667eea;
color:white;
}

.cards{
display:flex;
gap:15px;
justify-content:center;
margin-top:30px;
}

.card{
background:#f4f6fb;
padding:15px 25px;
border-radius:12px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.back{
display:inline-block;
margin-top:25px;
padding:10px 20px;
background:#667eea;
color:white;
border-radius:8px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h2>📊 Real Estate Market Insights</h2>

<table>

<tr>
<th>City</th>
<th>Avg Price / Sqft</th>
</tr>

{% for city,price in data.items() %}

<tr>
<td>{{ city }}</td>
<td>₹ {{ price }}</td>
</tr>

{% endfor %}

</table>

<h3 style="margin-top:40px;">Market Comparison</h3>

<canvas id="marketChart" width="400"></canvas>

<div class="cards">

<div class="card">
<h4>🏆 Most Expensive</h4>
<p>Mumbai</p>
</div>

<div class="card">
<h4>📈 Fast Growing</h4>
<p>Bangalore</p>
</div>

<div class="card">
<h4>💰 Affordable</h4>
<p>Chennai</p>
</div>

</div>

<a href="/" class="back">⬅ Back to Home</a>

</div>

<script>

const ctx = document.getElementById('marketChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: {{ data.keys()|list|tojson }},
datasets: [{
label: 'Avg Price per Sqft',
data: {{ data.values()|list|tojson }},
backgroundColor:[
'#4f46e5',
'#06b6d4',
'#22c55e',
'#f59e0b',
'#ef4444'
]
}]
}
});

</script>

</body>
</html>
